# ══════════════════════════════════════════════════════════════════════
# NETLIFY CONFIGURATION — Grail Message Kenya
# Alexander Bernhardt Publishing Company Kenya
# Security-hardened configuration
# ══════════════════════════════════════════════════════════════════════
[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ══════════════════════════════════════════════════════════════════════
# SECURITY HEADERS — Applied to every page on the site
# ══════════════════════════════════════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.auth0.com https://identity.netlify.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://identity.netlify.com https://*.auth0.com https://api.safaricom.co.ke; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none';"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Resource-Policy = "same-site"

# ══════════════════════════════════════════════════════════════════════
# API FUNCTION HEADERS — CORS lockdown
# ══════════════════════════════════════════════════════════════════════
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "https://grailmessagekenya.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Max-Age       = "86400"

# ══════════════════════════════════════════════════════════════════════
# REDIRECTS
# ══════════════════════════════════════════════════════════════════════

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/.env"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/netlify/functions/*"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "http://grailmessagekenya.netlify.app/*"
  to     = "https://grailmessagekenya.netlify.app/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
