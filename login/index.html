<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Grail Message Kenya</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --blue: #1a6aad; --dark: #0d2a42;
      --muted: #3a6a90; --light: #e8f4fd;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #87ceeb 0%, #d4eefd 100%);
      display: flex; align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', serif;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border: 2px solid rgba(26,106,173,0.2);
      border-radius: 14px;
      width: 100%; max-width: 440px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(26,106,173,0.15);
    }

    /* Header */
    .card-header {
      background: linear-gradient(135deg, #0d2a42, #1a6aad);
      padding: 35px 30px;
      text-align: center;
    }
    .card-symbol { font-size: 2.2rem; color: #fff; margin-bottom: 8px; }
    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem; font-weight: 700;
      color: #fff; letter-spacing: 2px;
      text-transform: uppercase;
    }
    .card-sub {
      font-size: .8rem; color: rgba(255,255,255,0.75);
      margin-top: 5px;
    }

    /* Tabs */
    .tab-row {
      display: flex;
      border-bottom: 2px solid rgba(26,106,173,0.1);
    }
    .tab {
      flex: 1; padding: 14px;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .72rem; letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer; color: var(--muted);
      background: none; border: none;
      border-bottom: 3px solid transparent;
      transition: all .2s;
    }
    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      background: rgba(26,106,173,0.04);
    }

    /* Body */
    .card-body { padding: 30px; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: .68rem; letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: .8rem 1rem;
      margin-bottom: 16px;
      border: 1.5px solid rgba(26,106,173,0.2);
      border-radius: 6px; font-size: .95rem;
      font-family: 'EB Garamond', serif;
      background: rgba(255,255,255,0.9);
      color: var(--dark); outline: none;
      transition: border-color .3s;
    }
    .form-input:focus { border-color: var(--blue); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .submit-btn {
      width: 100%; padding: .9rem;
      background: linear-gradient(135deg, var(--dark), var(--blue));
      color: #fff; border: none;
      border-radius: 6px;
      font-family: 'Cinzel', serif;
      font-size: .82rem; letter-spacing: .12em;
      cursor: pointer; transition: opacity .3s;
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: .88; }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    .msg-box {
      padding: .75rem 1rem;
      border-radius: 6px;
      font-size: .85rem;
      margin-bottom: 16px;
      display: none;
    }
    .msg-error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
    }
    .msg-success {
      background: #d1e7dd;
      border: 1px solid #badbcc;
      color: #0a3622;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(26,106,173,0.1);
      margin: 20px 0;
    }

    .hint {
      font-size: .8rem; color: var(--muted);
      text-align: center; line-height: 1.6;
    }

    .quote {
      font-style: italic; font-size: .85rem;
      color: var(--muted); text-align: center;
      padding: 16px 20px;
      background: var(--light);
      border-top: 1px solid rgba(26,106,173,0.1);
    }

    @media(max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <div class="card-symbol">✦</div>
    <p class="card-title">Grail Message Kenya</p>
    <p class="card-sub">
      Alexander Bernhardt Publishing Company Kenya
    </p>
  </div>

  <!-- Tabs -->
  <div class="tab-row">
    <button class="tab active" id="tabLogin"
      onclick="switchTab('login')">
      Sign In
    </button>
    <button class="tab" id="tabSignup"
      onclick="switchTab('signup')">
      Create Account
    </button>
  </div>

  <!-- Card Body -->
  <div class="card-body">

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="panelLogin">
      <div class="msg-box msg-error" id="loginError"></div>
      <div class="msg-box msg-success" id="loginSuccess"></div>

      <label class="form-label">Email Address</label>
      <input type="email" id="loginEmail"
        class="form-input" placeholder="your@email.com"
        autocomplete="email"/>

      <label class="form-label">Password</label>
      <input type="password" id="loginPassword"
        class="form-input" placeholder="Your password"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()"/>

      <button class="submit-btn" id="loginBtn"
        onclick="doLogin()">
        🔐 Sign In
      </button>

      <hr class="divider"/>
      <p class="hint">
        Don't have an account?
        <a href="#" onclick="switchTab('signup')"
          style="color:var(--blue);">Create one here</a>
      </p>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-panel" id="panelSignup">
      <div class="msg-box msg-error" id="signupError"></div>
      <div class="msg-box msg-success" id="signupSuccess"></div>

      <div class="form-row">
        <div>
          <label class="form-label">First Name *</label>
          <input type="text" id="signupFirst"
            class="form-input" placeholder="First name"/>
        </div>
        <div>
          <label class="form-label">Last Name *</label>
          <input type="text" id="signupLast"
            class="form-input" placeholder="Last name"/>
        </div>
      </div>

      <label class="form-label">Email Address *</label>
      <input type="email" id="signupEmail"
        class="form-input" placeholder="your@email.com"
        autocomplete="email"/>

      <label class="form-label">Phone Number *</label>
      <input type="tel" id="signupPhone"
        class="form-input" placeholder="07XX XXX XXX"/>

      <label class="form-label">City *</label>
      <input type="text" id="signupCity"
        class="form-input" placeholder="Your city or town"/>

      <label class="form-label">Password *</label>
      <input type="password" id="signupPassword"
        class="form-input"
        placeholder="Minimum 8 characters"/>

      <button class="submit-btn" id="signupBtn"
        onclick="doSignup()">
        ✦ Create My Account
      </button>

      <hr class="divider"/>
      <p class="hint">
        Already have an account?
        <a href="#" onclick="switchTab('login')"
          style="color:var(--blue);">Sign in here</a>
      </p>
    </div>

  </div>

  <!-- Quote -->
  <div class="quote">
    "Seek the Truth and the Truth will set you free."<br/>
    <em>— Abd-ru-shin</em>
  </div>

</div>

<script>
  // ── SUPABASE CONFIG ──────────────────────────
  const SUPABASE_URL  = 'https://ecxdrwomkxcuxlhqdtum.supabase.co';
  const SUPABASE_ANON = 'YOUR_ANON_KEY_HERE';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ── CHECK IF ALREADY LOGGED IN ───────────────
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      // Already logged in — go straight to site
      window.location.href = '/';
    }
  }

  // ── TAB SWITCHER ─────────────────────────────
  function switchTab(tab) {
    document.getElementById('panelLogin').classList
      .toggle('active', tab === 'login');
    document.getElementById('panelSignup').classList
      .toggle('active', tab === 'signup');
    document.getElementById('tabLogin').classList
      .toggle('active', tab === 'login');
    document.getElementById('tabSignup').classList
      .toggle('active', tab === 'signup');
  }

  // ── SHOW MESSAGE ─────────────────────────────
  function showMsg(id, text, type = 'error') {
    const el = document.getElementById(id);
    el.textContent   = text;
    el.style.display = 'block';
    el.className     = `msg-box msg-${type}`;
  }

  function hideMsg(id) {
    document.getElementById(id).style.display = 'none';
  }

  // ── LOGIN ────────────────────────────────────
  async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    hideMsg('loginError');
    hideMsg('loginSuccess');

    if (!email || !password) {
      showMsg('loginError', 'Please enter your email and password.');
      return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled    = true;

    const { data, error } = await sb.auth.signInWithPassword({
      email, password
    });

    if (error) {
      showMsg('loginError', error.message);
      btn.textContent = '🔐 Sign In';
      btn.disabled    = false;
      return;
    }

    // Success — go to main site
    showMsg('loginSuccess', 'Welcome back! Taking you in...', 'success');
    setTimeout(() => { window.location.href = '/'; }, 1200);
  }

  // ── SIGN UP ──────────────────────────────────
  async function doSignup() {
    const firstName = document.getElementById('signupFirst').value.trim();
    const lastName  = document.getElementById('signupLast').value.trim();
    const email     = document.getElementById('signupEmail').value.trim();
    const phone     = document.getElementById('signupPhone').value.trim();
    const city      = document.getElementById('signupCity').value.trim();
    const password  = document.getElementById('signupPassword').value;
    const btn       = document.getElementById('signupBtn');

    hideMsg('signupError');
    hideMsg('signupSuccess');

    // Validate
    if (!firstName || !lastName || !email || !phone || !city || !password) {
      showMsg('signupError', 'Please fill in all required fields.');
      return;
    }

    if (password.length < 8) {
      showMsg('signupError', 'Password must be at least 8 characters.');
      return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled    = true;

    // Create auth account
    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: {
          first_name: firstName,
          last_name:  lastName,
          phone,
          city
        },
        emailRedirectTo:
          'https://grailmessagekenya.netlify.app/welcome'
      }
    });

    if (error) {
      showMsg('signupError', error.message);
      btn.textContent = '✦ Create My Account';
      btn.disabled    = false;
      return;
    }

    // Also save to subscribers table
    await sb.from('subscribers').insert([{
      first_name: firstName,
      last_name:  lastName,
      email,
      phone,
      city,
      country: 'Kenya'
    }]).then(() => {}).catch(() => {});

    // Show success message
    showMsg(
      'signupSuccess',
      `✅ Account created! We sent a verification email to ${email}. 
       Please check your inbox and click the verify link 
       to activate your account.`,
      'success'
    );

    btn.textContent = '✦ Create My Account';
    btn.disabled    = false;
  }

  // ── START ────────────────────────────────────
  init();
</script>

</body>
</html>
